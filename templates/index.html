<!DOCTYPE html>
<html>
<head>
    <title>Smart Resume Analyzer</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="upload-container">

        <div class="upload-card">

            <h1 class="main-title">
                Smart Resume Analyzer
            </h1>

            <p class="subtitle">

                AI-Powered ATS Resume Matching Platform

            </p>

            <p class="description">

                Analyze resumes against job descriptions,
                identify skill gaps, and improve your chances
                of getting shortlisted.

            </p>

<form action="/analyze"
      method="POST"
      enctype="multipart/form-data">

    <h3 class="section-title">
        Upload Resume
    </h3>

    <input
        type="file"
        name="resume"
        class="file-input"
        required>

    <br><br>

    <h3 class="section-title">
        Job Description
    </h3>

    <textarea
        name="job_description"
        class="job-description"
        placeholder="Paste Job Description Here..."
        rows="8"
        required>
    </textarea>

    <br><br>

    <button
        type="submit"
        class="analyze-btn">

        Analyze Resume

    </button>

</form>

<div class="features">

    <p>✓ ATS Match Score</p>

    <p>✓ Skill Gap Analysis</p>

    <p>✓ Resume Suggestions</p>

    <p>✓ AI-Powered Matching</p>

</div>

        </div>

    </div>

</body>
</html>
